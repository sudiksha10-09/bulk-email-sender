# Nginx Configuration Template for Proxying Docker App
# Add this to your existing nginx configuration

# ============================================
# UPSTREAM CONFIGURATION
# ============================================
# Add this at the top of your nginx.conf or in a separate upstream file

upstream myapp_backend {
    server 127.0.0.1:9000;
    keepalive 32;
}

# ============================================
# HTTP SERVER BLOCK (Redirect to HTTPS)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com myapp.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS SERVER BLOCK (Main Configuration)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com myapp.yourdomain.com;

    # SSL Certificate Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/myapp_access.log;
    error_log /var/log/nginx/myapp_error.log;

    # Client upload size
    client_max_body_size 20M;

    # ============================================
    # STATIC FILES
    # ============================================
    location /static/ {
        alias /opt/myapp-docker/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # MEDIA FILES
    # ============================================
    location /media/ {
        alias /opt/myapp-docker/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ============================================
    # PROXY TO DJANGO APP
    # ============================================
    location / {
        proxy_pass http://myapp_backend;
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Connection Settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ============================================
    # HEALTH CHECK ENDPOINT
    # ============================================
    location /health/ {
        proxy_pass http://myapp_backend;
        access_log off;
    }

    # ============================================
    # DENY ACCESS TO SENSITIVE FILES
    # ============================================
    location ~ /\.env {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    location ~ /\.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ============================================
# ALTERNATIVE: SUBDOMAIN CONFIGURATION
# ============================================
# If you want to use a subdomain instead of a path

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myapp.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/myapp_access.log;
    error_log /var/log/nginx/myapp_error.log;

    client_max_body_size 20M;

    # Static files
    location /static/ {
        alias /opt/myapp-docker/static/;
        expires 30d;
    }

    # Media files
    location /media/ {
        alias /opt/myapp-docker/media/;
        expires 7d;
    }

    # Proxy to app
    location / {
        proxy_pass http://myapp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# ============================================
# RATE LIMITING (Optional)
# ============================================
# Add this in the http block of nginx.conf

limit_req_zone $binary_remote_addr zone=myapp_limit:10m rate=10r/s;

# Then add this in the location block:
# limit_req zone=myapp_limit burst=20 nodelay;

# ============================================
# GZIP COMPRESSION (Optional)
# ============================================
# Add this in the http block of nginx.conf

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript 
           application/json application/javascript application/xml+rss 
           application/rss+xml font/truetype font/opentype 
           application/vnd.ms-fontobject image/svg+xml;
gzip_disable "msie6";

# ============================================
# TESTING AND RELOADING
# ============================================
# Test configuration:
# sudo nginx -t

# Reload configuration:
# sudo systemctl reload nginx

# View logs:
# tail -f /var/log/nginx/myapp_access.log
# tail -f /var/log/nginx/myapp_error.log
